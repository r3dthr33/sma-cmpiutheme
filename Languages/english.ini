[OptionExplanations]
; COMMAND MENU
SpeedHelp=Change StepChart Speed.
AutoVelocityHelp=Set the AutoVelocity value.
DisplayHelp=Change StepChart and Background Display.
NoteSkinsHelp=Change the NoteSkin.
NoteSkinHelp=Change the NoteSkin.
PathHelp=Change StepChart Movement.
AlternateHelp=Change StepChart Appearance.
JudgeHelp=Change Judgment and its Appeareance.
RushHelp=Change Music Speed Rate.
ResetHelp=Set all the options to their default values.

# COMMAND WINDOW
; SPEED
Speedx1Help=Normal scroll speed.
Speedx2Help=Scroll notes at 2x speed.
Speedx2.5Help=Scroll notes at 2.5x speed.
Speedx3Help=Scroll notes at 3x speed.
Speedx3.5Help=Scroll notes at 3.5x speed.
Speedx4Help=Scroll notes at 4x speed.
Speedx4.5Help=Scroll notes at 4.5x speed.
Speedx5Help=Scroll notes at 5x speed.
Speedx5.5Help=Scroll notes at 5.5x speed.
Speedx6Help=Scroll notes at 6x speed.
SpeedAccelerationHelp=Notes speed up as they approach.
SpeedDecelerationHelp=Notes slow down as they approach.
SpeedEarthwormHelp=Notes expand and compress while scrolling.
SpeedP400Help=Auto Velocity 400.
SpeedP450Help=Auto Velocity 450.
SpeedP500Help=Auto Velocity 500.
SpeedP550Help=Auto Velocity 550.
SpeedP600Help=Auto Velocity 600.
SpeedP650Help=Auto Velocity 650.
SpeedP700Help=Auto Velocity 700.
AutoVelocity-100Help=Decrease Auto Velocity by 100.
AutoVelocity-10Help=Decrease Auto Velocity by 10.
AutoVelocity-1Help=Decrease Auto Velocity by 1.
AutoVelocity+1Help=Increase Auto Velocity by 1.
AutoVelocity+10Help=Increase Auto Velocity by 10.
AutoVelocity+100Help=Increase Auto Velocity by 100.

; DISPLAY
DisplayVanishHelp=Hide notes near the receptors.
DisplayNonstepHelp=Hide the StepChart.
DisplayAppearHelp=Show notes late as they approach.
DisplayFreedomHelp=Hide the receptor area.
DisplayFlashHelp=Make notes blink while scrolling.
DisplayBGAOFFHelp=Disable background animations.

; PATH
PathNXHelp=Use the NX-style note path.
PathUnderAttackHelp=Rotate the Notefield 180°.
PathDropPIUHelp=Changes receptor position to the bottom.
PathSnakeHelp=Move notes in a snake-like path.
PathSinkHelp=Make notes sink downward.
PathRiseHelp=Make notes rise upward.

; ALTERNATE
AlternateMirrorHelp=Mirror the step pattern.
AlternateRandomStepHelp=Randomize the step pattern.
AlternateRunnerHelp=Convert holds into roll notes.

; JUDGE
JudgeHideHelp=Hide judgment feedback.
JudgeReverseJudgmentHelp=Reverse judgment feedback.

; RUSH
Rush0.8xHelp=Play music at 80% speed.
Rush0.9xHelp=Play music at 90% speed.
Rush1.0xHelp=Play music at normal speed.
Rush1.1xHelp=Play music at 110% speed.
Rush1.2xHelp=Play music at 120% speed.
Rush1.3xHelp=Play music at 130% speed.
Rush1.4xHelp=Play music at 140% speed.
Rush1.5xHelp=Play music at 150% speed.
